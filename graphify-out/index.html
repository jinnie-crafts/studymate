<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyMate AI — Architecture Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050a18; --bg-card: rgba(15,23,42,0.75); --border: rgba(99,102,241,0.15);
      --border-hover: rgba(99,102,241,0.45); --text: #e2e8f0; --text-dim: #94a3b8;
      --blue: #3b82f6; --purple: #8b5cf6; --emerald: #10b981; --amber: #f59e0b; --rose: #f43f5e;
      --indigo: #6366f1; --radius: 14px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; }
    body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.07),transparent),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(139,92,246,.05),transparent); pointer-events:none; z-index:0; }

    /* Top bar */
    .topbar { position:relative; z-index:10; display:flex; align-items:center; gap:16px; padding:12px 20px; border-bottom:1px solid var(--border); backdrop-filter:blur(16px); background:rgba(5,10,24,.8); flex-shrink:0; }
    .topbar-badge { display:inline-flex; align-items:center; gap:5px; padding:4px 12px; border-radius:999px; background:rgba(99,102,241,.1); border:1px solid rgba(99,102,241,.2); font-size:.68rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--indigo); }
    .topbar h1 { font-size:1.15rem; font-weight:700; background:linear-gradient(135deg,#e2e8f0,#818cf8,#3b82f6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .topbar-stats { margin-left:auto; display:flex; gap:18px; font-size:.72rem; color:var(--text-dim); }
    .topbar-stats strong { color:var(--blue); font-weight:700; }

    /* Layout */
    .layout { display:flex; flex:1; overflow:hidden; position:relative; z-index:1; }

    /* Sidebar */
    .sidebar { width:260px; flex-shrink:0; border-right:1px solid var(--border); padding:16px; overflow-y:auto; background:rgba(5,10,24,.6); backdrop-filter:blur(12px); display:flex; flex-direction:column; gap:16px; }
    .sidebar h3 { font-size:.72rem; text-transform:uppercase; letter-spacing:.07em; color:var(--text-dim); font-weight:600; margin-bottom:6px; }
    .search-box { width:100%; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:rgba(15,23,42,.5); color:var(--text); font-size:.82rem; outline:none; transition:border-color .2s; }
    .search-box:focus { border-color:var(--indigo); }
    .search-box::placeholder { color:var(--text-dim); }

    .layer-filters { display:flex; flex-direction:column; gap:4px; }
    .layer-btn { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; border:1px solid transparent; background:transparent; color:var(--text); font-size:.8rem; font-weight:500; cursor:pointer; transition:all .2s; text-align:left; }
    .layer-btn:hover { background:rgba(99,102,241,.06); }
    .layer-btn.active { background:rgba(99,102,241,.1); border-color:var(--border-hover); }
    .layer-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .layer-count { margin-left:auto; font-size:.7rem; color:var(--text-dim); font-weight:600; }

    /* Detail panel */
    .detail-panel { width:300px; flex-shrink:0; border-left:1px solid var(--border); padding:20px; overflow-y:auto; background:rgba(5,10,24,.6); backdrop-filter:blur(12px); transition:transform .3s; }
    .detail-panel.hidden { transform:translateX(100%); width:0; padding:0; overflow:hidden; border:none; }
    .detail-title { font-size:1.1rem; font-weight:700; margin-bottom:4px; }
    .detail-type { font-size:.72rem; text-transform:uppercase; letter-spacing:.06em; color:var(--indigo); font-weight:600; margin-bottom:12px; }
    .detail-desc { font-size:.82rem; color:var(--text-dim); line-height:1.5; margin-bottom:16px; }
    .detail-section { margin-bottom:14px; }
    .detail-section h4 { font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); font-weight:600; margin-bottom:6px; }
    .detail-tag { display:inline-block; padding:3px 8px; border-radius:6px; font-size:.72rem; font-weight:500; background:rgba(59,130,246,.1); color:var(--blue); margin:2px 2px 2px 0; }
    .detail-path { font-family:'JetBrains Mono',monospace; font-size:.78rem; color:var(--blue); word-break:break-all; }
    .detail-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:1.1rem; }
    .detail-meta { font-size:.78rem; color:var(--text-dim); }
    .detail-meta span { color:var(--text); font-weight:600; }

    /* Canvas */
    .graph-area { flex:1; position:relative; overflow:hidden; }
    .graph-area svg { width:100%; height:100%; }
    .node-circle { cursor:pointer; transition:r .15s; }
    .node-circle:hover { filter:brightness(1.3); }
    .node-label { font-size:10px; fill:var(--text); pointer-events:none; font-weight:500; text-anchor:middle; dominant-baseline:central; }
    .edge-line { stroke-opacity:.2; }
    .edge-line:hover { stroke-opacity:.6; }
    .edge-label { font-size:7px; fill:var(--text-dim); pointer-events:none; }

    .tooltip { position:absolute; padding:8px 14px; border-radius:8px; background:rgba(15,23,42,.95); border:1px solid var(--border-hover); color:var(--text); font-size:.78rem; pointer-events:none; z-index:100; opacity:0; transition:opacity .15s; white-space:nowrap; backdrop-filter:blur(8px); }
    .tooltip.show { opacity:1; }

    /* Controls overlay */
    .graph-controls { position:absolute; bottom:16px; right:16px; display:flex; gap:6px; z-index:5; }
    .ctrl-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:1rem; backdrop-filter:blur(8px); transition:all .2s; }
    .ctrl-btn:hover { border-color:var(--border-hover); background:rgba(99,102,241,.1); }

    /* Legend */
    .legend { position:absolute; bottom:16px; left:16px; display:flex; gap:12px; font-size:.7rem; color:var(--text-dim); z-index:5; background:var(--bg-card); padding:8px 14px; border-radius:8px; border:1px solid var(--border); backdrop-filter:blur(8px); }
    .legend-item { display:flex; align-items:center; gap:4px; }
    .legend-dot { width:8px; height:8px; border-radius:50%; }

    @media(max-width:900px) {
      .sidebar { width:200px; }
      .detail-panel { width:240px; }
    }
    @media(max-width:640px) {
      .sidebar { display:none; }
      .detail-panel { position:absolute; right:0; top:0; bottom:0; z-index:20; width:280px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-badge">📐 Graphify</div>
  <h1>StudyMate AI — Architecture Graph</h1>
  <div class="topbar-stats">
    <span>Nodes: <strong id="statNodes">0</strong></span>
    <span>Edges: <strong id="statEdges">0</strong></span>
    <span>Layers: <strong id="statLayers">0</strong></span>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div>
      <h3>Search</h3>
      <input type="text" class="search-box" id="searchBox" placeholder="Filter nodes…" />
    </div>
    <div>
      <h3>Layers</h3>
      <div class="layer-filters" id="layerFilters"></div>
    </div>
    <div>
      <h3>Node Types</h3>
      <div class="layer-filters" id="typeFilters"></div>
    </div>
  </aside>

  <div class="graph-area" id="graphArea">
    <svg id="graphSvg"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="graph-controls">
      <button class="ctrl-btn" id="zoomIn" title="Zoom in">+</button>
      <button class="ctrl-btn" id="zoomOut" title="Zoom out">−</button>
      <button class="ctrl-btn" id="zoomReset" title="Reset view">⟲</button>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="detail-panel hidden" id="detailPanel">
    <button class="detail-close" id="detailClose">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const LAYER_COLORS = {
  frontend: '#3b82f6', backend: '#8b5cf6', cloud: '#10b981',
  firebase: '#f59e0b', external: '#f43f5e'
};
const TYPE_SHAPES = { page:16, script:14, stylesheet:10, cdn:10, service:18, api:18, config:10 };

let graphData = null;
let simulation = null;
let activeLayer = null;
let activeType = null;
let searchTerm = '';
let selectedNode = null;

async function init() {
  try {
    const res = await fetch('./graph.json');
    graphData = await res.json();
  } catch (e) { document.getElementById('graphArea').innerHTML = '<p style="padding:40px;color:#f43f5e;">Failed to load graph.json</p>'; return; }

  document.getElementById('statNodes').textContent = graphData.nodes.length;
  document.getElementById('statEdges').textContent = graphData.edges.length;
  document.getElementById('statLayers').textContent = graphData.layers.length;

  buildFilters();
  buildLegend();
  renderGraph();
  bindEvents();
}

function buildFilters() {
  const lf = document.getElementById('layerFilters');
  const allBtn = mkBtn('All Layers', null, true);
  allBtn.onclick = () => { activeLayer = null; updateFilters(lf, null); applyFilters(); };
  lf.appendChild(allBtn);

  graphData.layers.forEach(l => {
    const count = graphData.nodes.filter(n => n.layer === l.id).length;
    const btn = mkBtn(l.label, l.color, false, count);
    btn.onclick = () => { activeLayer = activeLayer === l.id ? null : l.id; updateFilters(lf, activeLayer === l.id ? btn : lf.firstChild); applyFilters(); };
    lf.appendChild(btn);
  });

  const tf = document.getElementById('typeFilters');
  const types = [...new Set(graphData.nodes.map(n => n.type))];
  const allTBtn = mkBtn('All Types', null, true);
  allTBtn.onclick = () => { activeType = null; updateFilters(tf, null); applyFilters(); };
  tf.appendChild(allTBtn);
  types.forEach(t => {
    const count = graphData.nodes.filter(n => n.type === t).length;
    const btn = mkBtn(t, '#6366f1', false, count);
    btn.onclick = () => { activeType = activeType === t ? null : t; updateFilters(tf, activeType === t ? btn : tf.firstChild); applyFilters(); };
    tf.appendChild(btn);
  });
}

function mkBtn(label, color, active, count) {
  const b = document.createElement('button');
  b.className = 'layer-btn' + (active ? ' active' : '');
  b.innerHTML = (color ? `<span class="layer-dot" style="background:${color}"></span>` : '') +
    `<span>${label}</span>` + (count !== undefined ? `<span class="layer-count">${count}</span>` : '');
  return b;
}

function updateFilters(container, activeBtn) {
  container.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
  if (activeBtn) activeBtn.classList.add('active');
  else container.firstChild.classList.add('active');
}

function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = graphData.layers.map(l =>
    `<div class="legend-item"><span class="legend-dot" style="background:${l.color}"></span>${l.label.split('—')[0].trim()}</div>`
  ).join('');
}

function renderGraph() {
  const svg = d3.select('#graphSvg');
  const width = document.getElementById('graphArea').clientWidth;
  const height = document.getElementById('graphArea').clientHeight;

  svg.selectAll('*').remove();

  const g = svg.append('g').attr('id', 'graphGroup');
  const zoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  document.getElementById('zoomIn').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.4);
  document.getElementById('zoomOut').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.7);
  document.getElementById('zoomReset').onclick = () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.7));

  const nodes = graphData.nodes.map(d => ({...d}));
  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  const edges = graphData.edges.filter(e => nodeMap.has(e.from) && nodeMap.has(e.to)).map(e => ({
    source: e.from, target: e.to, type: e.type, label: e.label || e.type, method: e.method
  }));

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(120).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(d => (TYPE_SHAPES[d.type] || 14) + 10))
    .force('x', d3.forceX(width / 2).strength(0.04))
    .force('y', d3.forceY(height / 2).strength(0.04));

  // Edges
  const link = g.append('g').selectAll('line').data(edges).join('line')
    .attr('class', 'edge-line')
    .attr('stroke', d => {
      const src = nodeMap.get(d.source.id || d.source);
      return src ? LAYER_COLORS[src.layer] || '#6366f1' : '#6366f1';
    })
    .attr('stroke-width', d => d.type === 'http' ? 2 : 1);

  // Nodes
  const node = g.append('g').selectAll('g').data(nodes).join('g')
    .call(d3.drag().on('start', dragStart).on('drag', dragging).on('end', dragEnd));

  node.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => TYPE_SHAPES[d.type] || 14)
    .attr('fill', d => LAYER_COLORS[d.layer] || '#6366f1')
    .attr('stroke', d => d3.color(LAYER_COLORS[d.layer] || '#6366f1').brighter(0.8))
    .attr('stroke-width', 2)
    .attr('opacity', 0.85);

  node.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => (TYPE_SHAPES[d.type] || 14) + 14)
    .text(d => d.label.length > 18 ? d.label.slice(0, 16) + '…' : d.label);

  // Tooltip and click
  const tooltip = document.getElementById('tooltip');
  node.on('mouseover', (e, d) => {
    tooltip.textContent = d.label + (d.description ? ' — ' + d.description.slice(0, 60) : '');
    tooltip.classList.add('show');
  }).on('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  }).on('mouseout', () => tooltip.classList.remove('show'))
  .on('click', (e, d) => { showDetail(d); highlightConnections(d, edges, node, link); });

  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Store refs for filtering
  window._gRefs = { node, link, nodes, edges, nodeMap, svg, zoom, g, width, height };

  // Initial zoom to fit
  setTimeout(() => svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(0.65)), 600);
}

function applyFilters() {
  const { node, link } = window._gRefs;
  node.each(function(d) {
    const layerMatch = !activeLayer || d.layer === activeLayer;
    const typeMatch = !activeType || d.type === activeType;
    const searchMatch = !searchTerm || d.label.toLowerCase().includes(searchTerm) || (d.description || '').toLowerCase().includes(searchTerm);
    const visible = layerMatch && typeMatch && searchMatch;
    d3.select(this).attr('opacity', visible ? 1 : 0.08);
  });
  link.attr('opacity', d => {
    const sf = getNodeOpacity(d.source); const tf = getNodeOpacity(d.target);
    return (sf > 0.5 && tf > 0.5) ? 0.25 : 0.03;
  });
}

function getNodeOpacity(d) {
  const layerMatch = !activeLayer || d.layer === activeLayer;
  const typeMatch = !activeType || d.type === activeType;
  const searchMatch = !searchTerm || d.label.toLowerCase().includes(searchTerm) || (d.description || '').toLowerCase().includes(searchTerm);
  return (layerMatch && typeMatch && searchMatch) ? 1 : 0.08;
}

function highlightConnections(d, edges, node, link) {
  const connected = new Set([d.id]);
  edges.forEach(e => {
    const sid = e.source.id || e.source; const tid = e.target.id || e.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  node.attr('opacity', n => connected.has(n.id) ? 1 : 0.1);
  link.attr('opacity', e => {
    const sid = e.source.id || e.source; const tid = e.target.id || e.target;
    return (sid === d.id || tid === d.id) ? 0.7 : 0.03;
  });
}

function showDetail(d) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  panel.classList.remove('hidden');
  selectedNode = d;

  const incoming = graphData.edges.filter(e => e.to === d.id);
  const outgoing = graphData.edges.filter(e => e.from === d.id);

  let html = `<div class="detail-title">${esc(d.label)}</div>`;
  html += `<div class="detail-type">${esc(d.type)} · ${esc(d.layer)}</div>`;
  if (d.description) html += `<div class="detail-desc">${esc(d.description)}</div>`;
  if (d.path) html += `<div class="detail-section"><h4>Path</h4><div class="detail-path">${esc(d.path)}</div></div>`;
  if (d.size) html += `<div class="detail-meta">Size: <span>${(d.size/1024).toFixed(1)} KB</span></div>`;
  if (d.lines) html += `<div class="detail-meta">Lines: <span>${d.lines}</span></div>`;
  if (d.exports) html += `<div class="detail-section"><h4>Exports</h4>${d.exports.map(x=>`<span class="detail-tag">${esc(x)}</span>`).join('')}</div>`;
  if (d.modules) html += `<div class="detail-section"><h4>Modules</h4>${d.modules.map(x=>`<span class="detail-tag">${esc(x)}</span>`).join('')}</div>`;
  if (d.models) html += `<div class="detail-section"><h4>AI Models</h4>${d.models.map(x=>`<span class="detail-tag">${esc(x)}</span>`).join('')}</div>`;

  if (incoming.length) html += `<div class="detail-section"><h4>Incoming (${incoming.length})</h4>${incoming.map(e=>`<span class="detail-tag">← ${esc(e.from)}</span>`).join('')}</div>`;
  if (outgoing.length) html += `<div class="detail-section"><h4>Outgoing (${outgoing.length})</h4>${outgoing.map(e=>`<span class="detail-tag">→ ${esc(e.to)}</span>`).join('')}</div>`;

  content.innerHTML = html;
}

function bindEvents() {
  document.getElementById('searchBox').addEventListener('input', e => {
    searchTerm = e.target.value.trim().toLowerCase();
    applyFilters();
  });
  document.getElementById('detailClose').addEventListener('click', () => {
    document.getElementById('detailPanel').classList.add('hidden');
    selectedNode = null;
    const { node, link } = window._gRefs;
    node.attr('opacity', 1); link.attr('opacity', 0.2);
    applyFilters();
  });
  document.getElementById('graphSvg').addEventListener('click', e => {
    if (e.target.tagName === 'svg' || e.target.id === 'graphGroup') {
      document.getElementById('detailPanel').classList.add('hidden');
      selectedNode = null;
      const { node, link } = window._gRefs;
      node.attr('opacity', 1); link.attr('opacity', 0.2);
      applyFilters();
    }
  });
}

function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

init();
</script>
</body>
</html>
