<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Account | StudyMate AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page recover-page">
    <header class="auth-header">
        <img src="img/study-mate.png" class="auth-logo" alt="StudyMate Logo" />
        <div class="auth-badge">StudyMate AI | Security</div>
    </header>

    <section class="auth-content">
        <main class="auth-card">
            <div class="auth-card-header">
                <h1 class="auth-title">Account Recovery</h1>
                <p class="auth-subtitle">Restoring your account to its previous state.</p>
            </div>

            <div id="recovery-status" class="status-container">
                <div class="loader" style="width:40px; height:40px; border:3px solid rgba(59,130,246,0.1); border-top:3px solid #3b82f6; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px;"></div>
                <p id="status-message">Verifying recovery code...</p>
            </div>

            <div id="success-actions" style="display:none; margin-top:30px;">
                <button id="backBtn" onclick="goBack()" class="primary-btn">Back to Login</button>
            </div>
        </main>
    </section>
    
    <footer class="auth-footer" style="margin-top: 20px; text-align: center;">
        <p class="auth-switch" style="font-size: 13px; opacity: 0.8;">
            <a href="privacy.html" >Privacy Policy</a> | <a href="terms.html">Terms of Service</a>
        </p>
    </footer>

    <style>
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        .success-text { color: #4ade80; font-weight: 600; }
        .error-text { color: #ef4444; font-weight: 600; }
    </style>

    <script>
        function goBack() {
          if (document.referrer && document.referrer !== window.location.href) {
            window.history.back();
          } else {
            window.location.href = "login.html";
          }
        }

        window.addEventListener('DOMContentLoaded', () => {
          const backBtn = document.getElementById('backBtn');
          if (backBtn) {
            backBtn.textContent = document.referrer ? "← Back" : "← Go to Login";
          }
        });
    </script>
    <script type="module" src="recover.js"></script>
</body>
</html>
