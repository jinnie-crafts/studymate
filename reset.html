<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | StudyMate AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page reset-page">
  <header class="auth-header">
    <img src="img/study-mate.png" class="auth-logo" alt="StudyMate Logo" />
    <div class="auth-badge">StudyMate AI | Premium</div>
  </header>

  <section class="auth-content">
    <main class="auth-card">
      <div class="auth-card-header">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your new password below.</p>
      </div>

      <input type="password" id="newPassword" placeholder="New Password" required />
      <button id="resetBtn" class="primary-btn">Update Password</button>

      <p id="statusMessage" class="form-message" style="margin-top: 15px;"></p>
    </main>
  </section>

  <footer class="auth-footer">
    <p class="auth-switch"><button id="backBtn" onclick="goBack()" style="background: none; border: none; color: inherit; cursor: pointer; text-decoration: underline; font-family: inherit; font-size: inherit; padding: 0;">Back to Login</button></p>
    <p class="auth-switch" style="margin-top: 12px; font-size: 13px; opacity: 0.8;">
      <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a>
    </p>
  </footer>

  <script>
    function goBack() {
      if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
      } else {
        window.location.href = "login.html";
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const backBtn = document.getElementById('backBtn');
      if (backBtn) {
        backBtn.textContent = document.referrer ? "← Back" : "← Go to Login";
      }
    });
  </script>
  <script type="module" src="reset.js"></script>
</body>
</html>
