<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | StudyMate AI</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .reset-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px 0;
    }
    .reset-loading .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(59,130,246,0.15);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .reset-loading p {
      color: #94a3b8;
      font-size: 14px;
    }

    .reset-form { display: none; }
    .reset-form.visible { display: block; }

    .reset-form input {
      margin-bottom: 12px;
    }

    .password-requirements {
      font-size: 12px;
      color: #64748b;
      margin: -4px 0 16px;
      padding-left: 4px;
    }

    .reset-error-state {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .reset-error-state.visible { display: block; }
    .reset-error-state .error-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .reset-error-state h2 {
      color: #ef4444;
      margin-bottom: 8px;
      font-size: 20px;
    }
    .reset-error-state p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body class="auth-page reset-page">
  <header class="auth-header">
    <img src="img/study-mate.png" class="auth-logo" alt="StudyMate Logo" />
    <div class="auth-badge">StudyMate AI | Premium</div>
  </header>

  <section class="auth-content">
    <main class="auth-card">
      <div class="auth-card-header">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle" id="resetSubtitle">Verifying your reset link...</p>
      </div>

      <!-- Loading state while verifying oobCode -->
      <div id="resetLoading" class="reset-loading">
        <div class="loader"></div>
        <p>Validating reset link...</p>
      </div>

      <!-- Error state for invalid/expired links -->
      <div id="resetError" class="reset-error-state">
        <div class="error-icon">⚠️</div>
        <h2 id="resetErrorTitle">Invalid Reset Link</h2>
        <p id="resetErrorMessage">This password reset link is invalid or has expired. Please request a new one.</p>
        <a href="login.html" class="primary-btn" style="display: inline-block; text-decoration: none; text-align: center;">Back to Login</a>
      </div>

      <!-- Password reset form (shown after oobCode is verified) -->
      <div id="resetForm" class="reset-form">
        <input type="password" id="newPassword" placeholder="New Password" required autocomplete="new-password" />
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" required autocomplete="new-password" />
        <p class="password-requirements">Minimum 6 characters</p>
        <button id="resetBtn" class="primary-btn">Update Password</button>
      </div>

      <p id="statusMessage" class="form-message" style="margin-top: 15px;"></p>
    </main>
  </section>

  <footer class="auth-footer">
    <p class="auth-switch"><button id="backBtn" onclick="goBack()" style="background: none; border: none; color: inherit; cursor: pointer; text-decoration: underline; font-family: inherit; font-size: inherit; padding: 0;">Back to Login</button></p>
    <p class="auth-switch" style="margin-top: 12px; font-size: 13px; opacity: 0.8;">
      <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a>
    </p>
  </footer>

  <script>
    function goBack() {
      if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
      } else {
        window.location.href = "login.html";
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const backBtn = document.getElementById('backBtn');
      if (backBtn) {
        backBtn.textContent = document.referrer ? "← Back" : "← Go to Login";
      }
    });
  </script>
  <script type="module" src="reset.js"></script>
</body>
</html>
