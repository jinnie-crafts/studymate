<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | StudyMate AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="signup" class="auth-page">
  <main class="auth-shell">
    <section class="auth-copy">
      <div class="auth-badge">StudyMate AI | karsh</div>
      <h1>Create your account and start chatting smarter.</h1>
      <p>
        Sign up with email and password and continue your
        learning sessions anytime.
      </p>
    </section>

    <section class="auth-card glass-card">
      <div class="auth-header">
        <h2>Sign Up</h2>
        <p>Create your account in a few seconds.</p>
      </div>

      <form id="signupForm" class="auth-form" novalidate>
        <label>
          <span>Email</span>
          <input id="signupEmail" type="email" placeholder="you@example.com" required />
        </label>

        <label>
          <span>Password</span>
          <input id="signupPassword" type="password" placeholder="At least 6 characters" minlength="6" required />
        </label>

        <button class="primary-btn full-width" type="submit">Create Account</button>
      </form>

      <div class="auth-divider">
        <span>OR</span>
      </div>

      <button id="googleLoginBtn" class="google-btn" type="button">
        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.3-1.5 3.9-5.5 3.9-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.8 3.5 14.7 2.6 12 2.6 6.9 2.6 2.8 6.7 2.8 11.8S6.9 21 12 21c6.1 0 9.1-4.3 9.1-6.6 0-.4 0-.7-.1-1H12z"/>
          <path fill="#34A853" d="M2.8 11.8c0 1.6.4 3.1 1.2 4.4l3.5-2.7c-.2-.5-.4-1.1-.4-1.7s.1-1.2.4-1.7L4 7.4c-.8 1.3-1.2 2.8-1.2 4.4z"/>
          <path fill="#FBBC05" d="M12 21c2.7 0 4.9-.9 6.6-2.5l-3.2-2.5c-.9.6-2 .9-3.4.9-2.5 0-4.7-1.7-5.5-3.9L4 15.6C5.7 18.9 8.6 21 12 21z"/>
          <path fill="#4285F4" d="M18.6 18.5c1.9-1.8 2.5-4.4 2.5-6.2 0-.6-.1-1.1-.2-1.6H12v3.9h5.5c-.3 1.1-.9 2.7-2.3 3.9l3.4 0z"/>
        </svg>
        <span>Continue with Google</span>
      </button>

      <p id="authMessage" class="form-message"></p>
      <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <div id="confirmModal" class="modal confirm-modal" aria-hidden="true">
    <div class="modal-content glass-card confirm-content">
      <p id="confirmModalLabel" class="panel-overline">Please Confirm</p>
      <h3 id="confirmModalTitle">Are you sure?</h3>
      <p id="confirmModalMessage" class="confirm-message">This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="confirmCancelBtn" class="ghost-btn" type="button">Cancel</button>
        <button id="confirmOkBtn" class="primary-btn" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
